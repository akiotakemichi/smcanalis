<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market AI Analyzer by Andre</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0e14; color: #e2e8f0; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        .status-glow {
            width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%; display: inline-block;
            box-shadow: 0 0 8px #22c55e, 0 0 15px #22c55e; animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .search-input { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .search-input:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [image, setImage] = useState(null);
            const [base64Image, setBase64Image] = useState("");
            const [query, setQuery] = useState("");
            const [analysis, setAnalysis] = useState("");
            const [loading, setLoading] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setImage(URL.createObjectURL(file));
                    const reader = new FileReader();
                    reader.onloadend = () => setBase64Image(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                }
            };

            const callGemini = async (prompt, imageData = null) => {
                if (!apiKey) return alert("Pasang API Key dulu!");
                setLoading(true);
                setAnalysis("");

                try {
                    const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                    const parts = [{ text: prompt }];
                    if (imageData) parts.push({ inline_data: { mime_type: "image/jpeg", data: imageData } });

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts }] })
                    });

                    const data = await response.json();
                    if (data.error) setAnalysis(`Eror: ${data.error.message}`);
                    else setAnalysis(data.candidates[0].content.parts[0].text);
                } catch (error) {
                    setAnalysis("Koneksi gagal.");
                } finally {
                    setLoading(false);
                }
            };

            const handleSearch = (e) => {
                e.preventDefault();
                if (!query.trim()) return;
                callGemini(`Pertanyaan Trading: ${query}. Jawab dengan singkat dan profesional.`);
            };

            const analyzeChart = () => {
                if (!base64Image) return alert("Pilih gambar dulu!");
                callGemini("Analisa chart ini dengan metode SMC (BOS, CHOCH, OB, FVG). Tentukan area BUY/SELL, SL, dan TP.", base64Image);
            };

            return (
                <div className="min-h-screen p-4 md:p-10 flex flex-col items-center">
                    {/* Header */}
                    <div className="w-full max-w-5xl flex justify-between items-center mb-6 glass-card p-6 rounded-3xl">
                        <div>
                            <h1 className="text-2xl font-bold text-blue-500">Market AI <span className="text-white font-light text-sm">by Andre</span></h1>
                            <div className="flex items-center gap-2 mt-1">
                                {apiKey ? <><span className="status-glow"></span><span className="text-[10px] text-green-400 uppercase tracking-widest font-bold font-mono">Connected</span></> 
                                : <span className="text-[10px] text-red-500 uppercase tracking-widest font-bold">Offline</span>}
                            </div>
                        </div>
                        <button onClick={() => { const k = prompt("API Key:"); if(k) {setApiKey(k); localStorage.setItem('gemini_api_key', k);}}} 
                        className={`text-xs px-4 py-2 rounded-xl border transition-all ${apiKey ? 'bg-green-500/10 border-green-500/50 text-green-400' : 'bg-slate-800 border-slate-700'}`}>
                            {apiKey ? 'Key Tersimpan' : 'Set API Key'}
                        </button>
                    </div>

                    {/* AI Search Bar */}
                    <form onSubmit={handleSearch} className="w-full max-w-5xl mb-8 relative">
                        <input 
                            type="text" 
                            value={query}
                            onChange={(e) => setQuery(e.target.value)}
                            placeholder="Tanya apapun tentang Trading ke AI... (ex: Apa itu Order Block?)"
                            className="w-full search-input py-4 px-6 pr-14 rounded-2xl text-sm"
                        />
                        <button type="submit" className="absolute right-4 top-3 text-blue-500 hover:text-blue-400 transition">
                            <i className={`fas ${loading ? 'fa-circle-notch animate-spin' : 'fa-paper-plane'} text-lg`}></i>
                        </button>
                    </form>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 w-full max-w-5xl">
                        {/* Upload Panel */}
                        <div className="glass-card p-6 rounded-[2rem] space-y-6">
                            <div className="relative border-2 border-dashed border-slate-800 rounded-2xl aspect-video flex items-center justify-center bg-slate-900/30 overflow-hidden">
                                {image ? <img src={image} className="w-full h-full object-contain" /> : <div className="text-center"><i className="fas fa-image text-3xl mb-2 opacity-20"></i><p className="text-slate-500 text-xs">Pilih Gambar Chart</p></div>}
                                <input type="file" onChange={handleImageChange} className="absolute inset-0 opacity-0 cursor-pointer" />
                            </div>
                            <button onClick={analyzeChart} disabled={loading || !image} className="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold transition shadow-lg disabled:opacity-50">
                                {loading ? "Menganalisa..." : "Analisa Chart Gambar"}
                            </button>
                        </div>

                        {/* Result Panel */}
                        <div className="glass-card p-6 rounded-[2rem] flex flex-col h-full">
                            <h2 className="text-xs font-bold mb-4 text-purple-400 uppercase tracking-widest flex items-center gap-2">
                                <i className="fas fa-terminal"></i> AI Output
                            </h2>
                            <div className="flex-1 bg-black/20 rounded-xl p-4 overflow-y-auto custom-scroll min-h-[350px] text-sm text-slate-300 whitespace-pre-wrap border border-white/5 leading-relaxed">
                                {analysis || "Gunakan Search Bar atau Upload Chart untuk memulai."}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
